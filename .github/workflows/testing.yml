name: Run tests
permissions:
  contents: read

on: [pull_request]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  UV_FROZEN: true # https://docs.astral.sh/uv/configuration/environment/#uv_frozen


jobs:
  tests:
    name: "Python ${{ matrix.python-version }}"
    runs-on: "ubuntu-latest"
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          prune-cache: false
          python-version: ${{ matrix.python-version }}

      # Run tests WITHOUT libsuitesparse and scikit-sparse

      - run: uv sync --extra dev

      - name: pytest
        run: uv run pytest -ra -m 'not suitesparse' --durations=5

      - name: doctest
        run: uv run pytest src/ --doctest-modules --ignore-glob='**/enif*'

      # Run tests WITH libsuitesparse and scikit-sparse

      - name: Install SuiteSparse
        run: sudo apt-get install -y libsuitesparse-dev

      - run: uv sync --extra dev --extra sparse

      - name: pytest
        run: uv run pytest -ra -m 'suitesparse'

      - name: doctest
        run: uv run pytest src/ --doctest-modules
