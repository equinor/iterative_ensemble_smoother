---
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    cooldown:
      default-days: 7
    groups:
      all-actions:
        patterns:
          - "*"

  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "monthly"
    allow:
      - dependency-type: "all"
    versioning-strategy: "lockfile-only"
    groups:
      all-deps:
        patterns:
          - "*"
    cooldown:
      default-days: 7
